<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayHub - Smart Room & PG Management System</title>
    <meta name="description" content="StayHub is a smart Room and PG Management System designed for easy tenant tracking, room allocation, and fees ledger management.">
    <meta name="keywords" content="Room Management System, PG Management Software, StayHub, Hostel Management System, Tenant Tracker, Fees Ledger App">
    <meta name="author" content="Aman Mishra">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="global.css">
    <style>
        .login-body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f6f9;
            font-family: Arial, sans-serif;
        }
        .login-card {
            background: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card h2 {
            margin-bottom: 25px;
            color: #1a202c;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #4a5568;
        }
        .password-container {
            position: relative;
            display: flex;
            align-items: center;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }
        #loginPassword {
            padding-right: 40px;
        }
        .toggle-password {
            position: absolute;
            right: 12px;
            cursor: pointer;
            color: #718096;
            font-size: 16px;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #2b6cb0;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
        }
        .login-btn:hover { background-color: #2c5282; }
        .error-msg { color: #e53e3e; font-size: 14px; margin-top: 10px; display: none; }
        .divider { display: flex; align-items: center; text-align: center; margin: 25px 0; color: #a0aec0; font-size: 12px; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #e2e8f0; }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }
        .social-login-options { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .social-btn { display: flex; justify-content: center; align-items: center; width: 50px; height: 50px; border: 1px solid #e2e8f0; border-radius: 50%; cursor: pointer; font-size: 20px; background: #fff; }
        .signup-text { font-size: 14px; color: #718096; margin-top: 15px; }
        .signup-text a { color: #2b6cb0; text-decoration: none; font-weight: bold; }

        /* ----- 🔥 NEW: LOGIN/LOGOUT LOADER STYLE ----- */
        .loader-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            display: none; /* Pehle se chhupa rahega */
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2b6cb0;
            border-radius: 50%;
            width: 50px; height: 50px;
            animation: spin 1s linear infinite;
        }
        .loader-text {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #2b6cb0;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="login-body">

    <div class="loader-overlay" id="loadingScreen">
        <div class="spinner"></div>
        <div class="loader-text" id="loaderText">Logging in... Please wait</div>
    </div>

    <div class="login-card">
        <h2>🔑 SmartPG Admin Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Admin Email</label>
                <input type="email" id="loginEmail" placeholder="admin@gmail.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-container">
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                    <i class="fa-solid fa-eye toggle-password" id="eyeIcon"></i>
                </div>
            </div>
            <button type="submit" class="login-btn">Login</button>
            <div id="errorBox" class="error-msg">Invalid Email or Password!</div>
        </form>

        <div class="divider">Or Login With</div>
        <div class="social-login-options">
            <div class="social-btn" onclick="socialLogin('Google')"><i class="fa-brands fa-google" style="color: #db4437;"></i></div>
            <div class="social-btn" onclick="socialLogin('Facebook')"><i class="fa-brands fa-facebook-f" style="color: #4267b2;"></i></div>
            <div class="social-btn" onclick="socialLogin('Twitter')"><i class="fa-brands fa-x-twitter"></i></div>
        </div>
        <div class="signup-text">
            Don't have an account? <a href="#" id="createAccountBtn">Create New Account</a>
        </div>
    </div>

    <script>
        const passwordInput = document.getElementById("loginPassword");
        const eyeIcon = document.getElementById("eyeIcon");
        const loadingScreen = document.getElementById("loadingScreen");

        // Eye Toggle
        eyeIcon.addEventListener("click", () => {
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                eyeIcon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                passwordInput.type = "password";
                eyeIcon.classList.replace("fa-eye-slash", "fa-eye");
            }
        });

        // Form Submit with Animation
        document.getElementById("loginForm").addEventListener("submit", (e) => {
            e.preventDefault();
            const email = document.getElementById("loginEmail").value;
            const pass = document.getElementById("loginPassword").value;
            const errorBox = document.getElementById("errorBox");

            if (email === "admin@gmail.com" && pass === "admin123") {
                errorBox.style.display = "none";
                
                // 🔥 Animation ko show karo
                loadingScreen.style.display = "flex"; 
                
                // 1.5 second baad next page par bhejo
                setTimeout(() => {
                    localStorage.setItem("isLoggedIn", "true");
                    window.location.href = "index.html"; 
                }, 1500);
            } else {
                errorBox.style.display = "block";
            }
        });

        function socialLogin(p) { alert(p + " Login integration coming soon!"); }
        document.getElementById("createAccountBtn").addEventListener("click", (e) => { e.preventDefault(); alert("Registration is currently closed."); });
    </script>
</body>
</html>
